name: Build Biborne Messagerie (Mac + Windows)

# - Push sur main (sans tag)      -> compile juste pour tester, installateurs en "Artifacts" (pas d'auto-update)
# - Push d'un tag v1.2.3          -> compile ET publie une Release GitHub -> les apps déjà installées
#                                    détectent la nouvelle version et se mettent à jour toutes seules.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/copy-vendor.js

      # Sur un tag v*.*.*, --publish always crée/complète la Release GitHub avec les installateurs
      # (c'est ce fichier de Release qu'electron-updater lit pour savoir qu'une mise à jour existe).
      # Étape séparée + appel direct à npx electron-builder (plus fiable sur Windows que "npm run -- --flag",
      # dont le passage d'arguments à travers un script chaîné avec && n'est pas fiable sous cmd.exe).
      - name: Build (et publie si tag)
        shell: bash
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature + notarisation Mac (ignorés par le job Windows, electron-builder ne les lit
          # que pour la cible "mac"). Sans ça, le build Mac reste non signé -> erreur "fichier
          # endommagé" à l'installation et mises à jour auto cassées (voir electron-updater/Squirrel.Mac).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Toujours garder une copie en artifact aussi, pratique pour tester un push sur main sans tag.
      - uses: actions/upload-artifact@v4
        with:
          name: biborne-desktop-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: warn
